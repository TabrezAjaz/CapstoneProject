<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f3d3a"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b2b2b"/>
      <stop offset="0.55" stop-color="#0f3d3a"/>
      <stop offset="1" stop-color="#145a52"/>
    </linearGradient>
    <style>
      .ttl   { fill:#ffffff; font-size:22px; font-weight:700; }
      .sub   { fill:#5eead4; font-size:12.5px; letter-spacing:2px; }
      .box   { rx:8; }
      .lab   { font-size:13px; font-weight:600; fill:#0b2b2b; }
      .lab2  { font-size:11px; fill:#334155; }
      .labw  { font-size:13px; font-weight:600; fill:#ffffff; }
      .tag   { font-size:10px; font-weight:700; }
      .corehdr { fill:#145a52; font-size:13px; font-weight:700; letter-spacing:1px; }
      .leg   { font-size:12px; fill:#334155; }
      .colhdr{ font-size:12px; font-weight:700; fill:#0f3d3a; letter-spacing:1px; }
    </style>
  </defs>

  <!-- ===== Title band ===== -->
  <rect x="0" y="0" width="1200" height="74" fill="url(#band)"/>
  <rect x="0" y="70" width="1200" height="5" fill="#2dd4bf"/>
  <text x="40" y="34" class="ttl">Container Image Vulnerability Scanner — System Architecture</text>
  <text x="41" y="56" class="sub">TRIVY · PYTHON · DOCKER · CVE / NVD   ·   SPRINT 1 SCOPE HIGHLIGHTED</text>

  <!-- ===== Column headers ===== -->
  <text x="60"  y="110" class="colhdr">INPUT SOURCES</text>
  <text x="360" y="110" class="colhdr">SCANNER CORE</text>
  <text x="900" y="110" class="colhdr">OUTPUTS &amp; CONSUMERS</text>

  <!-- ===== INPUT SOURCES ===== -->
  <!-- Docker Images -->
  <rect x="50" y="150" width="210" height="62" class="box" fill="#e0f2fe" stroke="#0369a1" stroke-width="2" rx="8"/>
  <text x="155" y="178" text-anchor="middle" class="lab">Docker Images</text>
  <text x="155" y="196" text-anchor="middle" class="lab2">local build / docker pull</text>

  <!-- Registry -->
  <rect x="50" y="232" width="210" height="62" class="box" fill="#e0f2fe" stroke="#0369a1" stroke-width="2" rx="8"/>
  <text x="155" y="260" text-anchor="middle" class="lab">Container Registry</text>
  <text x="155" y="278" text-anchor="middle" class="lab2">Docker Hub / ECR / GHCR</text>

  <!-- CI/CD trigger (future) -->
  <rect x="50" y="314" width="210" height="62" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="155" y="338" text-anchor="middle" class="lab" fill="#475569">CI/CD Trigger</text>
  <text x="155" y="356" text-anchor="middle" class="lab2">GitHub Actions / Jenkins</text>
  <rect x="208" y="320" width="46" height="16" rx="8" fill="#e0e7ff"/>
  <text x="231" y="332" text-anchor="middle" class="tag" fill="#4338ca">S2</text>

  <!-- arrows inputs -> core -->
  <path d="M260,181 L312,210" fill="none" stroke="#0f3d3a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M260,263 L312,300" fill="none" stroke="#0f3d3a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M260,345 L312,388" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>

  <!-- ===== ONLINE CVE FEEDS (cloud) ===== -->
  <path d="M652,96 q-24,0 -24,20 q-20,2 -16,20 q-14,6 4,18 l150,0 q22,-4 16,-20 q16,-10 -2,-22 q2,-18 -22,-18 q-14,-14 -34,-6 q-20,-8 -40,10 z"
        fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
  <text x="710" y="124" text-anchor="middle" class="lab" font-size="12">Online CVE Feeds</text>
  <text x="710" y="140" text-anchor="middle" class="lab2">NVD · GHSA · distro advisories</text>

  <!-- ===== SCANNER CORE container ===== -->
  <rect x="312" y="150" width="460" height="470" fill="#ffffff" stroke="#145a52" stroke-width="2.5" rx="12"/>
  <rect x="312" y="150" width="460" height="30" fill="#e6f4f1" rx="12"/>
  <rect x="312" y="166" width="460" height="14" fill="#e6f4f1"/>
  <text x="332" y="171" class="corehdr">SCANNING ENGINE  (SPRINT 1)</text>

  <!-- config.yaml -->
  <rect x="336" y="196" width="190" height="48" class="box" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="431" y="218" text-anchor="middle" class="lab">config.yaml</text>
  <text x="431" y="234" text-anchor="middle" class="lab2">severities · fail_on · paths</text>

  <!-- exceptions allowlist (future) -->
  <rect x="548" y="196" width="200" height="48" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="648" y="216" text-anchor="middle" class="lab" fill="#475569">exceptions / allowlist</text>
  <text x="648" y="232" text-anchor="middle" class="lab2">approved CVEs</text>
  <rect x="700" y="200" width="44" height="16" rx="8" fill="#e0e7ff"/>
  <text x="722" y="212" text-anchor="middle" class="tag" fill="#4338ca">S5</text>

  <!-- Python wrapper -->
  <rect x="336" y="266" width="412" height="56" class="box" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5" rx="8"/>
  <text x="542" y="290" text-anchor="middle" class="lab">Python Wrapper</text>
  <text x="542" y="308" text-anchor="middle" class="lab2">scanner/trivy_scanner.py — runs scan, parses JSON</text>

  <!-- Trivy engine -->
  <rect x="336" y="342" width="412" height="56" class="box" fill="#0d9488" stroke="#0b2b2b" stroke-width="2" rx="8"/>
  <text x="542" y="366" text-anchor="middle" class="labw">Trivy Engine</text>
  <text x="542" y="384" text-anchor="middle" class="lab2" fill="#d1fae5">image scan · severity classification</text>

  <!-- Vuln DB -->
  <rect x="336" y="418" width="412" height="62" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="8"/>
  <text x="542" y="444" text-anchor="middle" class="lab">Vulnerability Database (local cache)</text>
  <text x="542" y="462" text-anchor="middle" class="lab2">trivy-db — CVE/NVD · GHSA · distro secdb</text>

  <!-- Scan results -->
  <rect x="336" y="502" width="412" height="56" class="box" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5" rx="8"/>
  <text x="542" y="526" text-anchor="middle" class="lab">Scan Results</text>
  <text x="542" y="544" text-anchor="middle" class="lab2">JSON · table — severity counts &amp; findings</text>

  <!-- internal flow arrows -->
  <path d="M431,244 L431,264" fill="none" stroke="#0f3d3a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M648,244 L600,264" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
  <path d="M542,322 L542,340" fill="none" stroke="#0f3d3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M542,398 L542,416" fill="none" stroke="#0f3d3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M542,480 L542,500" fill="none" stroke="#0f3d3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Trivy <-> DB query (double) -->
  <text x="560" y="412" class="lab2" fill="#92400e">queries</text>

  <!-- cloud refresh into DB -->
  <path d="M710,150 L710,300 Q710,449 756,449 L752,449" fill="none" stroke="#14b8a6" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="724" y="250" class="lab2" fill="#0d9488" transform="rotate(90 724 250)">DB refresh (24h)</text>

  <!-- ===== OUTPUTS ===== -->
  <!-- CI/CD gate -->
  <rect x="890" y="150" width="270" height="56" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="1010" y="174" text-anchor="middle" class="lab" fill="#475569">CI/CD Build Gate</text>
  <text x="1010" y="192" text-anchor="middle" class="lab2">pass / fail on HIGH · CRITICAL</text>
  <rect x="1118" y="156" width="36" height="16" rx="8" fill="#e0e7ff"/>
  <text x="1136" y="168" text-anchor="middle" class="tag" fill="#4338ca">S2</text>

  <!-- Reporters -->
  <rect x="890" y="226" width="270" height="56" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="1010" y="250" text-anchor="middle" class="lab" fill="#475569">Reporters</text>
  <text x="1010" y="268" text-anchor="middle" class="lab2">HTML · PDF · JSON</text>
  <rect x="1118" y="232" width="36" height="16" rx="8" fill="#e0e7ff"/>
  <text x="1136" y="244" text-anchor="middle" class="tag" fill="#4338ca">S3</text>

  <!-- Notifiers -->
  <rect x="890" y="302" width="270" height="56" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="1010" y="326" text-anchor="middle" class="lab" fill="#475569">Notifiers</text>
  <text x="1010" y="344" text-anchor="middle" class="lab2">Slack · Microsoft Teams · email</text>
  <rect x="1118" y="308" width="36" height="16" rx="8" fill="#e0e7ff"/>
  <text x="1136" y="320" text-anchor="middle" class="tag" fill="#4338ca">S3</text>

  <!-- Prometheus -->
  <rect x="890" y="378" width="270" height="56" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="1010" y="402" text-anchor="middle" class="lab" fill="#475569">Prometheus Metrics</text>
  <text x="1010" y="420" text-anchor="middle" class="lab2">vulns found / resolved / pending</text>
  <rect x="1118" y="384" width="36" height="16" rx="8" fill="#e0e7ff"/>
  <text x="1136" y="396" text-anchor="middle" class="tag" fill="#4338ca">S4</text>

  <!-- Grafana -->
  <rect x="890" y="454" width="270" height="56" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="1010" y="478" text-anchor="middle" class="lab" fill="#475569">Grafana Dashboard</text>
  <text x="1010" y="496" text-anchor="middle" class="lab2">historical trends &amp; filters</text>
  <rect x="1118" y="460" width="36" height="16" rx="8" fill="#e0e7ff"/>
  <text x="1136" y="472" text-anchor="middle" class="tag" fill="#4338ca">S4</text>

  <!-- results -> outputs fan-out -->
  <path d="M748,520 Q820,520 826,178 L884,178" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
  <path d="M748,524 Q826,524 830,254 L884,254" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
  <path d="M748,530 Q840,530 844,330 L884,330" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
  <path d="M748,536 Q840,536 844,406 L884,406" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
  <!-- prometheus -> grafana -->
  <path d="M1010,434 L1010,452" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="50" y="650" width="1100" height="92" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="10"/>
  <text x="70" y="676" class="colhdr">LEGEND</text>

  <rect x="70" y="690" width="26" height="18" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="104" y="704" class="leg">Sprint 1 — built &amp; verified in this report</text>

  <rect x="360" y="690" width="26" height="18" rx="4" fill="#0d9488" stroke="#0b2b2b" stroke-width="2"/>
  <text x="394" y="704" class="leg">Trivy engine (core scanner)</text>

  <rect x="600" y="690" width="26" height="18" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="634" y="704" class="leg">Vulnerability database</text>

  <rect x="820" y="690" width="26" height="18" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="854" y="704" class="leg">Future sprints (S2–S5)</text>

  <rect x="70" y="716" width="26" height="18" rx="4" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text x="104" y="730" class="leg">Image input sources</text>
  <text x="360" y="730" class="leg"><tspan font-weight="700" fill="#4338ca">S2–S5</tspan> = sprint in which the dashed component is implemented</text>
</svg>
